# YouTube RAG Chatbot - Deployment Configuration

services:
  - type: web
    name: youtube-rag-bot
    runtime: python
    plan: free
    buildCommand: cd youtube-rag-extension/backend && pip install -r requirements.txt
    startCommand: cd youtube-rag-extension/backend && python app_cloud.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.2-3b-instruct:free
      - key: USE_CLOUD_PIPELINE
        value: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PORT
        value: 8000
    healthCheckPath: /health
